<div class="main-wrapper">
  <div class="login-container">
    <div class="image-container">
      <img src="assets/images/gold-temp.webp" alt="Left side image" />
    </div>

    <div class="form-section">
      <div class="form-header">
        <div class="logo">
          <!-- <span class="logo-icon"> -->
          <img src="/assets/images/finacclogo.png" alt="no logo" class="logo-img">
          <!-- </span> -->
          <strong>FinAcc</strong>
        </div>

      </div>

      <div class="form-content">
        <h1>Login to Access</h1>
        <p class="subtitle">Make your PawnShop business fully automated</p>

        <!-- <form > -->
        <div class="form-grid">
          <div class="form-group">
            <label>Client Code</label>
            <input type="text" placeholder="Enter client code..." [(ngModel)]="clientCode"
              (keydown.enter)="submitBtn.click()" />
          </div>
          <div class="form-group">
            <label>UserName</label>
            <input #usernameInput type="text" placeholder="Enter username..." [(ngModel)]="username"
              (keydown.enter)="submitBtn.click()" />
          </div>
        </div>

        <div class="form-group">
          <label class="auth-label">Password</label>
          <input #passwordInput type="password" placeholder="Enter password..." [(ngModel)]="password"
            (keydown.enter)="Login()" />
        </div>
        <button #submitBtn (click)="Login()" class="btn btn-primary">LOGIN</button>

        @if(errorMessage){
        <p class="login-err">{{errorMessage}}</p>
        }


      </div>
    </div>
  </div>
</div>

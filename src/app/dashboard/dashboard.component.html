<div class="dashboard-layout">
    <app-sidebar class="sidebar-wrapper"></app-sidebar>
    <main class="main-wrapper">
        <div class="header-wrapper">
            <app-header (openBranchSelection)="showCompanySelectionModal = true"></app-header>
        </div>
        <div class="content-body">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>

<!-- Global Company Selection Modal mapped directly over Dashboard layout -->
@if (showCompanySelectionModal) {
<app-company-selection 
  [canClose]="hasSelectedCompany"
  (companySelected)="onCompanySelected($event)" 
  (close)="showCompanySelectionModal = false">
</app-company-selection>
}

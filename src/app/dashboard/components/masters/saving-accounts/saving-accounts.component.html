<div class="table-outer no-print">
  <div class="table-header">
    <h2>Savings Accounts List</h2>
    <button (click)="createNew()" class="btn create-new-btn">
      <i class="bx bx-plus"></i>
      Create New
    </button>
  </div>
  <div>
    <app-tableview
      [DataSource]="DataSource()"
      [FieldNames]="FieldNames()"
      [PrimaryKey]="'SbAcSno'"
      (actionEvent)="handleAction($event)"
      [RowsPerPage]="10"
      [EnableDateSelection]="false" 
      [EnableCheckbox]="false"
      [EnablePrint]="true"
      [EnableMail]="false"
    ></app-tableview>
  </div>
</div>
<router-outlet></router-outlet>

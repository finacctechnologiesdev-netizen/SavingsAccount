<div class="form-viewport">

  <!-- Header: only Update button -->
  <header class="form-header-slim">
    <div class="header-info">
      <h2>App Setup</h2>
    </div>
    <div class="header-actions">
      <button (click)="updateSetup()" type="button" class="btn-save" [disabled]="isSaving">
        @if (isSaving) {
          <i class="bx bx-loader-alt bx-spin"></i>
          Updating...
        } @else {
          <i class="bx bx-save"></i>
          Update
        }
      </button>
    </div>
  </header>

    <div class="form-scroll-content">
      <form class="clean-form-layout">

        <!-- Scheme Code Configuration -->
        <div class="form-section no-border">
          <h6 class="group-label">Account Code Configuration</h6>
          <div class="form-row">

            <!-- Auto Generate -->
            <div class="input-container w-180">
              <select
                id="AccCode_AutoGen"
                name="AccCode_AutoGen"
                [(ngModel)]="Setup.AccCode_AutoGen">
                <option [ngValue]="0">Manual</option>
                <option [ngValue]="1">Auto Generate</option>
              </select>
              <label for="AccCode_AutoGen">Auto Generate</label>
            </div>

            <!-- ACC Code Prefix -->
            <div class="input-container w-180">
              <input
                type="text"
                id="AccCode_Prefix"
                name="AccCode_Prefix"
                [(ngModel)]="Setup.AccCode_Prefix"
                (blur)="submitCount > 0 ? validateFields() : null"
                [class.error]="submitCount > 0 && errors['AccCode_Prefix']"
                placeholder=" " />
              <label for="AccCode_Prefix">Account Prefix <span class="req">*</span></label>
              @if (submitCount > 0 && errors['AccCode_Prefix']) {
                <span class="error-msg">{{ errors['AccCode_Prefix'] }}</span>
              }
            </div>

            <!-- Current No -->
            <div class="input-container w-160">
              <input
                type="number"
                id="AccCode_CurrentNo"
                name="AccCode_CurrentNo"
                [(ngModel)]="Setup.AccCode_CurrentNo"
                (blur)="submitCount > 0 ? validateFields() : null"
                [class.error]="submitCount > 0 && errors['AccCode_CurrentNo']"
                placeholder=" " />
              <label for="AccCode_CurrentNo">Current No <span class="req">*</span></label>
              @if (submitCount > 0 && errors['AccCode_CurrentNo']) {
                <span class="error-msg">{{ errors['AccCode_CurrentNo'] }}</span>
              }
            </div>

            <!-- Code Width -->
            <div class="input-container w-130">
              <input
                type="number"
                id="AccCode_Width"
                name="AccCode_Width"
                [(ngModel)]="Setup.AccCode_Width"
                (blur)="submitCount > 0 ? validateFields() : null"
                [class.error]="submitCount > 0 && errors['AccCode_Width']"
                placeholder=" " />
              <label for="AccCode_Width">Code Width <span class="req">*</span></label>
              @if (submitCount > 0 && errors['AccCode_Width']) {
                <span class="error-msg">{{ errors['AccCode_Width'] }}</span>
              }
            </div>

          </div>
        </div>

      </form>
    </div>

</div>

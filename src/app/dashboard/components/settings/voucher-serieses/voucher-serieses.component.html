<div class="table-outer">
  <div class="table-header">
    <h2>Voucher Series List</h2>
    <button (click)="createNew()" class="btn create-new-btn">
      <i class="bx bx-plus"></i>
      Create New
    </button>
  </div>
  <div>
    <app-tableview [DataSource]="DataSource()" [FieldNames]="FieldNames()" [PrimaryKey]="'SeriesSno'"
      (actionEvent)="handleAction($event)" [RowsPerPage]="10" [EnableDateSelection]="false" [EnableCheckbox]="false"
      [EnablePrint]="false" [EnableMail]="false"></app-tableview>
  </div>
</div>

@if (showForm) {
<div class="modal-overlay">
  <div class="modal-content">
    <app-voucher-series [editMode]="isEditMode" [inputSeries]="selectedSeries" (closeEvent)="onFormClosed()"
      (saveEvent)="onFormSaved($event)">
    </app-voucher-series>
  </div>
</div>
}
